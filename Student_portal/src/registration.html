<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <link rel="stylesheet" href="output.css">
</head>

<body class="flex">

    <!-- Right div: Group10 background image -->
    <div class="bg-[url('/assets/Group10.png')] bg-cover bg-center h-screen w-3/5">
    </div>

    <!-- Left div: British School logo and registration inputs -->
    <div class="w-2/5 p-8 flex flex-col items-center justify-center">
        <div class="">
            <img src="/assets/British School 1.png" alt="British School Logo" class="mb-6">
            <h2 class="text-2xl font-bold mb-4">Registration Form</h2>
            <span>Already have an account? <a href="" class="text-orange-400">Login</a></span>
            <div class="space-y-4">
                <!-- Registration inputs will go here -->
                <div class="flex gap-4 pt-5">
                    <input type="text" placeholder="First Name" class="w-full px-4 py-2 border rounded">
                    <input type="text" placeholder="Last Name" class="w-full px-4 py-2 border rounded">
                </div>
                <input type="email" placeholder="Email" class="w-full px-4 py-2 border rounded">
                <input type="email" placeholder="Confirm Email" class="w-full px-4 py-2 border rounded">
                <div class="flex gap-4">
                    <input type="text" placeholder="Phone Number" class="w-full px-4 py-2 border rounded">
                    <input type="text" placeholder="Token" class="w-full px-4 py-2 border rounded">
                </div>
                <div class="flex gap-6">
                    <div class="flex justify-center items-center gap-2">
                        <div class="flex gap-2">
                            <label for="male">male</label>
                            <input type="checkbox">
                        </div>
                        <div class="mr-38 flex gap-2">
                            <label for="female">female</label>
                            <input type="checkbox">
                        </div>
                    </div>
                    <input type="text" placeholder="Department" class="w-full px-4 py-2 border rounded">
                </div>
                <a href="admin.html">
                <button class="w-full bg-orange-500 text-white py-2 rounded-2xl">Register</button>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
