<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
</head>

<body>
    <!-- Hero Section -->
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-white relative overflow-hidden">
        <!-- Decorative circles -->
        <div class="absolute top-20 left-10 w-32 h-32 bg-orange-200 rounded-full opacity-30"></div>
        <div class="absolute top-40 right-20 w-24 h-24 bg-blue-200 rounded-full opacity-30"></div>
        <div class="absolute bottom-20 left-1/4 w-40 h-40 bg-yellow-200 rounded-full opacity-20"></div>
        <div class="absolute top-1/3 right-1/4 w-20 h-20 bg-orange-300 rounded-full opacity-25"></div>
        
        <div class="container mx-auto px-6 py-8 relative z-10">
            <div class="flex flex-col lg:flex-row items-center justify-between min-h-screen">
                <!-- Left Column -->
                <div class="lg:w-1/2 mb-12 lg:mb-0">
                    <!-- Logo -->
                    <div class="mb-8">
                        <img src="../assets/British School 1.png" alt="THE BRITISH SCHOOL" class="h-16">
                    </div>
                    
                    <!-- Main Heading -->
                    <h1 class="text-4xl lg:text-6xl font-bold text-gray-800 mb-6 leading-tight">
                        BETTER FUTURE<br/>FOR YOUR KIDS
                    </h1>
                    
                    <!-- Description -->
                    <p class="text-gray-600 text-lg mb-8 max-w-md">
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                    </p>
                    
                    <!-- CTA Button -->
                    <button class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-8 py-4 rounded-full flex items-center gap-3 mb-6 transition-colors">
                        <span>JOIN US TODAY</span>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                        </svg>
                    </button>
                    
                    <!-- Video Link -->
                    <a href="#" class="flex items-center gap-3 text-gray-700 hover:text-orange-500 transition-colors">
                        <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-orange-500">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 0 1 0 1.971l-11.54 6.347a1.125 1.125 0 0 1-1.667-.985V5.653Z" />
                            </svg>
                        </div>
                        <span class="font-medium">Watch our welcome video</span>
                    </a>
                    
                    <!-- Certifications -->
                    <div class="flex gap-8 mt-12">
                        <img src="../assets/ielts_4 1IELTS.png" alt="IELTS" class="h-12">
                        <img src="../assets/1_NJcXlxpFp_6Ppk8-17Dd-Q 1TOEFL.png" alt="TOEFL" class="h-12">
                    </div>
                </div>
                
                <!-- Right Column -->
                <div class="lg:w-1/2 relative">
                    <!-- Navigation -->
                    <nav class="absolute top-0 right-0 flex items-center gap-6 bg-white/80 backdrop-blur-sm px-6 py-3 rounded-full shadow-lg">
                        <a href="#" class="text-gray-700 hover:text-orange-500 font-medium transition-colors">Programs</a>
                        <a href="#" class="text-gray-700 hover:text-orange-500 font-medium transition-colors">Extra-Curricular</a>
                        <a href="#" class="text-gray-700 hover:text-orange-500 font-medium transition-colors">Our Staff</a>
                        <a href="#" class="text-gray-700 hover:text-orange-500 font-medium transition-colors">Gallery</a>
                        <button class="bg-orange-500 hover:bg-orange-600 text-white font-medium px-4 py-2 rounded-full transition-colors">
                            Login/Register
                        </button>
                    </nav>
                    
                    <!-- Hero Image -->
                    <div class="mt-20 relative">
                        <img src="../assets/hero-3-cover.png" alt="Student" class="rounded-2xl shadow-2xl w-full max-w-md mx-auto">
                        
                        <!-- Decorative elements around image -->
                        <div class="absolute -top-4 -right-4 w-16 h-16 bg-orange-300 rounded-full opacity-40"></div>
                        <div class="absolute -bottom-6 -left-6 w-20 h-20 bg-blue-300 rounded-full opacity-30"></div>
                        <div class="absolute top-1/2 -left-8 w-12 h-12 bg-yellow-300 rounded-full opacity-35"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
