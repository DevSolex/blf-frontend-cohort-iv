<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The British School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'cream': '#F5F2EC',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .gradient-text-better {
            background: linear-gradient(to right, #6B7280, #4B5563);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-text-future {
            background: linear-gradient(to right, #F59E0B, #D97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-text-for {
            background: linear-gradient(to right, #60A5FA, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-text-kids {
            background: linear-gradient(to right, #3B82F6, #1D4ED8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-orange-button {
            background: linear-gradient(to right, #FF8A00, #FFB700);
        }

        .gradient-login-button {
            background: linear-gradient(to right, #FF8A00, #FFA500);
        }

        .gradient-blue-right {
            background: linear-gradient(135deg, #4a90e2 0%, #0056b3 50%, #003d82 100%);
        }
    </style>
</head>

<body class="">
    <div class="min-h-screen flex relative">
        <!-- Left Section -->
        <div class="w-3/5 px-16 pt-3 flex justify-start relative z-10 bg-cream">
            <div class="">
                <!-- Decorative circles for left column -->
                <div class="absolute top-16 left-16 w-24 h-24 rounded-full border-2 border-yellow-400 opacity-30"></div>
                <div class="absolute top-1/3 left-1/4 w-6 h-6 rounded-full bg-yellow-300 opacity-40"></div>
                <div class="absolute bottom-32 right-24 w-10 h-10 rounded-full border-2 border-orange-400 opacity-30">
                </div>
                <div class="absolute top-1/2 left-40 w-4 h-4 rounded-full bg-orange-200 opacity-50"></div>

                <!-- Logo -->
                <div class="mb-12 flex items-center justify-between">
                    <img src="./assets/British School 1.png" alt="THE BRITISH SCHOOL" class="h-16">
                    <div class="text-2xl font-bold text-gray-800 flex gap-4">

                        <a href="#"
                            class="text-gray-700 hover:text-orange-500 font-semibold transition-colors text-sm">Programs</a>
                        <a href="#"
                            class="text-gray-700 hover:text-orange-500 font-semibold transition-colors text-sm">Extra-Curricular</a>
                    </div>
                </div>

                <div class=" flex flex-col items-start gap-6">
                    <!-- Main Headline -->
                    <img src="/assets/Group 3.png" alt="" class="w-23">

                    <!-- Description -->
                    <p class="text-gray-600 text-lg mb-10 max-w-lg leading-relaxed">
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ullamcorper augue cras massa facilisis
                        dolor
                        volutpat quam risus venenatis.
                    </p>

                    <!-- CTA Section -->
                    <div class="flex items-center gap-6 mb-12">
                        <button
                            class="gradient-orange-button text-white font-bold px-12 py-5 rounded-full flex items-center gap-3 shadow-xl hover:shadow-2xl transition-all transform hover:scale-105">
                            <span>JOIN US TODAY</span>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                            </svg>
                        </button>

                        <a href="#"
                            class="flex items-center gap-3 text-gray-700 hover:text-orange-500 transition-colors group">
                            <div
                                class="w-14 h-14 bg-orange-100 rounded-full flex items-center justify-center group-hover:bg-orange-200 transition-colors shadow-md">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                    stroke="currentColor" class="w-7 h-7 text-orange-500">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 0 1 0 1.971l-11.54 6.347a1.125 1.125 0 0 1-1.667-.985V5.653Z" />
                                </svg>
                            </div>
                            <span class="font-semibold text-base">Watch our welcome video</span>
                        </a>
                    </div>

                    <!-- Bottom Logos -->
                    <div class="flex gap-12">
                        <img src="./assets/ielts_4 1IELTS.png" alt="IELTS" class="h-10">
                        <img src="./assets/1_NJcXlxpFp_6Ppk8-17Dd-Q 1TOEFL.png" alt="TOEFL" class="h-10">
                    </div>
                </div>
            </div>
            <img src="/assets/Rectangle 3.png" alt="" class="absolute top-0 -right-6 h-45 w-12">
        </div>

        <!-- Right Section -->
        <div class="w-2/5 bg-[url('./assets/hero-3-cover.png')] bg-cover bg-center relative">
            <!-- Top Navigation -->
            <nav class="flex items-center gap-8 justify-between px-20 py-8">
                <div class=" flex gap-6">
                    <a href="#" class="text-white hover:text-orange-500 font-semibold transition-colors text-sm">Our
                        Staff</a>
                    <a href="#"
                        class="text-white hover:text-orange-500 font-semibold transition-colors text-sm">Gallery</a>
                </div>
                <a href="/src/registration.html">
                <button class="gradient-login-button text-white font-bold px-8 py-3 rounded-full shadow-md">
                    Login/Register
                </button>
                </a>
            </nav>
            <img src="/assets/Rectangle 3(1).png" alt="" class="absolute top-0 left-0 h-90 w-6 z-0">

        </div>
    </div>
</body>

</html>
